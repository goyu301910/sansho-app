name: Farmoデータ自動更新

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 JST 6:00（UTC 21:00）
  workflow_dispatch:         # GitHub画面から手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: Farmo からデータを取得
        env:
          FARMO_EMAIL:    ${{ secrets.FARMO_EMAIL }}
          FARMO_PASSWORD: ${{ secrets.FARMO_PASSWORD }}
        run: python scripts/fetch_local.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "変更なし" || (
            git commit -m "データ自動更新: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
            git push
          )
