name: Farmoデータ自動更新

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分に実行（日本時間 +9h）
  workflow_dispatch:        # 手動実行ボタン

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install requests playwright

      - name: Playwright ブラウザをインストール
        run: playwright install chromium --with-deps

      - name: Farmo からCSVを取得
        env:
          FARMO_EMAIL:    ${{ secrets.FARMO_EMAIL }}
          FARMO_PASSWORD: ${{ secrets.FARMO_PASSWORD }}
        run: python scripts/fetch_farmo.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "変更なし" || (
            git commit -m "データ更新: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          )
