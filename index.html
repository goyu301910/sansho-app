<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>山椒 圃場モニター</title>
  <link rel="stylesheet" href="style.css?v=6">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>

<!-- ===== PIN認証オーバーレイ ===== -->
<div id="pinOverlay" class="pin-overlay">
  <div class="pin-card">
    <div class="pin-logo">山椒 圃場モニター</div>
    <div class="pin-username" id="pinUserName"></div>
    <div class="pin-label">PINを入力してください</div>
    <div class="pin-dots">
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-grid">
      <button class="pin-key" data-val="1">1</button>
      <button class="pin-key" data-val="2">2</button>
      <button class="pin-key" data-val="3">3</button>
      <button class="pin-key" data-val="4">4</button>
      <button class="pin-key" data-val="5">5</button>
      <button class="pin-key" data-val="6">6</button>
      <button class="pin-key" data-val="7">7</button>
      <button class="pin-key" data-val="8">8</button>
      <button class="pin-key" data-val="9">9</button>
      <button class="pin-key pin-key-del" data-val="del">⌫</button>
      <button class="pin-key" data-val="0">0</button>
      <div></div>
    </div>
  </div>
</div>

<header>
  <h1>山椒 圃場モニター</h1>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="files">
    <div class="tab-icon-wrap"><span class="tab-icon">📁</span></div>
    <span class="tab-label">ファイル</span>
  </button>
  <button class="tab-btn" data-tab="yearly">
    <div class="tab-icon-wrap"><span class="tab-icon">📊</span></div>
    <span class="tab-label">比較</span>
  </button>
  <button class="tab-btn" data-tab="pheno">
    <div class="tab-icon-wrap"><span class="tab-icon">📅</span></div>
    <span class="tab-label">物候記録</span>
  </button>
  <button class="tab-btn" data-tab="weather">
    <div class="tab-icon-wrap"><span class="tab-icon">🌤️</span></div>
    <span class="tab-label">気象</span>
  </button>
</nav>

<main>

  <!-- ===== ファイル管理 ===== -->
  <section id="tab-files" class="tab-content active">

    <div class="card">
      <span class="card-label">Farmo 自動取得</span>
      <div id="autoFetchStatus" class="auto-status">未取得</div>
      <button class="btn-primary" id="autoFetchBtn" style="margin-bottom:0">最新データを取得</button>
    </div>

    <div class="section-divider">または手動でCSVをアップロード</div>
    <div class="upload-area">
      <div class="upload-icon">&#128193;</div>
      <p>タップしてCSVを選択</p>
      <p class="upload-sub">複数ファイル同時選択可</p>
      <input type="file" id="csvInput" accept=".csv" multiple>
    </div>

    <div id="uploadStatus"></div>
    <div id="fieldList"></div>
  </section>

  <!-- ===== 比較 ===== -->
  <section id="tab-yearly" class="tab-content">

    <div class="card">
      <span class="card-label">比較期間</span>
      <div class="date-row">
        <input type="date" id="yearlyStartDate">
        <span class="date-sep">〜</span>
        <input type="date" id="yearlyEndDate">
      </div>
    </div>

    <div class="card">
      <span class="card-label">圃場を選択</span>
      <div id="yearlyFieldSelect">
        <p class="empty-msg">まずデータを読み込んでください</p>
      </div>
    </div>

    <div class="card">
      <span class="card-label">指標</span>
      <div id="yearlyMetricSelect">
        <p class="empty-msg">まずデータを読み込んでください</p>
      </div>
    </div>

    <div class="card">
      <span class="card-label">表示モード</span>
      <div class="mode-options">
        <label class="mode-option">
          <input type="radio" name="yearlyMode" value="raw" checked>
          <div class="mode-option-inner">
            <span class="mode-name">実測値</span>
            <span class="mode-desc">日ごとの測定値を比較</span>
          </div>
        </label>
        <label class="mode-option">
          <input type="radio" name="yearlyMode" value="cumulative">
          <div class="mode-option-inner">
            <span class="mode-name">積算値</span>
            <span class="mode-desc">期間先頭からの累計で比較</span>
          </div>
        </label>
        <label class="mode-option">
          <input type="radio" name="yearlyMode" value="chill">
          <div class="mode-option-inner">
            <span class="mode-name">低温積算</span>
            <span class="mode-desc">
              平均気温 ≤ <input type="number" id="chillThreshold" class="inline-num" value="5" min="-20" max="30" step="0.5">°C の日数を積算
            </span>
          </div>
        </label>
        <label class="mode-option">
          <input type="radio" name="yearlyMode" value="chillhours">
          <div class="mode-option-inner">
            <span class="mode-name">チル時間</span>
            <span class="mode-desc">
              平均気温 ≤ <span id="chillHoursThresholdDisplay">5</span>°C の温度欠損積算 (Σ 閾値−気温)
            </span>
          </div>
        </label>
      </div>
    </div>

    <button class="btn-primary" id="yearlyAnalyzeBtn">比較グラフを表示</button>

    <div id="yearlyChartContainer"></div>
    <div id="yearlyInfo"></div>

  </section>

  <!-- ===== 物候記録 ===== -->
  <section id="tab-pheno" class="tab-content">

    <div class="card">
      <span class="card-label">記録の追加・編集</span>

      <div class="form-field">
        <label class="form-label">圃場名</label>
        <input type="text" id="phenoFieldName" list="phenoFieldList"
               placeholder="圃場名を入力または選択" class="form-input">
        <datalist id="phenoFieldList"></datalist>
      </div>

      <div class="form-field">
        <label class="form-label">年度</label>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="phenoYear" min="2020" max="2035" value="2025" class="form-input form-input-sm">
          <span class="form-unit">年度</span>
        </div>
      </div>

      <div class="pheno-date-grid">
        <div class="form-field">
          <label class="form-label">開花日</label>
          <input type="date" id="phenoBloom" class="form-input">
        </div>
        <div class="form-field">
          <label class="form-label">収穫開始日</label>
          <input type="date" id="phenoHarvestStart" class="form-input">
        </div>
        <div class="form-field">
          <label class="form-label">収穫終了日</label>
          <input type="date" id="phenoHarvestEnd" class="form-input">
        </div>
        <div class="form-field">
          <label class="form-label">早期落葉日</label>
          <input type="date" id="phenoLeafDrop" class="form-input">
        </div>
      </div>
      <p class="hint" style="margin-bottom:8px">早期落葉：病害等による落葉があれば記録（→不時発芽リスクの追跡に使用）</p>

      <div class="form-field">
        <label class="form-label">メモ</label>
        <textarea id="phenoMemo" class="form-input form-textarea" rows="3"
                  placeholder="病害・天候・特記事項など"></textarea>
      </div>

      <button class="btn-primary" id="phenoSaveBtn" style="margin-top:10px">記録する</button>
    </div>

    <div id="phenoList"></div>

  </section>

  <!-- ===== 気象情報 ===== -->
  <section id="tab-weather" class="tab-content">
    <div class="card">
      <span class="card-label">圃場を選択</span>
      <div id="wagriFieldSelect"><p class="empty-msg">データ読込中...</p></div>
    </div>
    <div class="card">
      <span class="card-label">指標</span>
      <div id="wagriMetricSelect"></div>
    </div>
    <div class="card">
      <span class="card-label">期間</span>
      <div class="date-row">
        <input type="date" id="wagriStartDate">
        <span class="date-sep">〜</span>
        <input type="date" id="wagriEndDate">
      </div>
    </div>
    <button class="btn-primary" id="wagriShowBtn">グラフを表示</button>
    <div id="weatherDisplay"></div>
  </section>

</main>

<script src="app.js?v=6"></script>
</body>
</html>
